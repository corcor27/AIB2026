<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Illustrative ROC and precision-recall curves</title>
  <desc id="desc">A side-by-side teaching figure showing an ROC curve and a precision-recall curve with example threshold points.</desc>
  <rect width="960" height="430" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Illustrative Threshold Curves</text>

  <g transform="translate(80,70)">
    <text x="180" y="-12" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">ROC Curve</text>
    <rect x="0" y="0" width="360" height="280" fill="#ffffff" stroke="#d1d5db"/>
    <line x1="40" y1="240" x2="320" y2="240" stroke="#374151" stroke-width="2"/>
    <line x1="40" y1="240" x2="40" y2="20" stroke="#374151" stroke-width="2"/>
    <line x1="40" y1="240" x2="320" y2="20" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6"/>
    <path d="M40 240 C75 180, 105 120, 145 95 S235 40, 320 24" fill="none" stroke="#2563eb" stroke-width="4"/>
    <circle cx="118" cy="122" r="5" fill="#2563eb"/>
    <circle cx="195" cy="66" r="5" fill="#2563eb"/>
    <circle cx="265" cy="35" r="5" fill="#2563eb"/>
    <text x="128" y="115" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1f2937">high threshold</text>
    <text x="205" y="59" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1f2937">mid</text>
    <text x="220" y="24" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1f2937">low threshold</text>
    <text x="180" y="273" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#374151">False positive rate</text>
    <text x="-18" y="145" text-anchor="middle" transform="rotate(-90 -18 145)" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#374151">True Positive Rate</text>
    <text x="28" y="248" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">0</text>
    <text x="28" y="24" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">1</text>
    <text x="320" y="258" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">1</text>
    <text x="180" y="304" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4b5563">Closer to the top-left is usually better.</text>
  </g>

  <g transform="translate(530,70)">
    <text x="180" y="-12" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Precision-Recall Curve</text>
    <rect x="0" y="0" width="360" height="280" fill="#ffffff" stroke="#d1d5db"/>
    <line x1="40" y1="240" x2="320" y2="240" stroke="#374151" stroke-width="2"/>
    <line x1="40" y1="240" x2="40" y2="20" stroke="#374151" stroke-width="2"/>
    <path d="M40 52 C90 58, 125 68, 165 92 S250 145, 320 225" fill="none" stroke="#dc2626" stroke-width="4"/>
    <circle cx="100" cy="62" r="5" fill="#dc2626"/>
    <circle cx="185" cy="102" r="5" fill="#dc2626"/>
    <circle cx="280" cy="182" r="5" fill="#dc2626"/>
    <text x="110" y="54" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1f2937">high threshold</text>
    <text x="195" y="95" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1f2937">mid</text>
    <text x="190" y="176" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1f2937">low threshold</text>
    <text x="180" y="273" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#374151">Recall</text>
    <text x="-56" y="145" text-anchor="middle" transform="rotate(-90 -56 145)" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#374151">Precision</text>
    <text x="28" y="248" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">0</text>
    <text x="28" y="24" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">1</text>
    <text x="320" y="258" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">1</text>
    <text x="180" y="304" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4b5563">More informative when the positive class is rare.</text>
  </g>
</svg>