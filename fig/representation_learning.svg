<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Representation learning and reuse</title>
  <desc id="desc">A diagram showing a single encoder flow, with a dashed pretraining region around the training objective and a note that the trained encoder can later be reused on new inputs.</desc>
  <rect width="1200" height="560" fill="#fafaf9"/>

  <text x="60" y="56" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2937">Representation learning and reuse</text>

  <rect x="60" y="140" width="250" height="220" rx="18" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
  <text x="90" y="190" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Input</text>
  <text x="90" y="240" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">text tokens</text>
  <text x="90" y="275" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">image pixels</text>
  <text x="90" y="310" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">time series</text>
  <text x="90" y="345" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">genomic sequence</text>

  <rect x="470" y="110" width="280" height="250" rx="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
  <text x="535" y="155" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Encoder</text>
  <rect x="555" y="195" width="110" height="30" rx="10" fill="#c4b5fd"/>
  <rect x="535" y="240" width="150" height="30" rx="10" fill="#a78bfa"/>
  <rect x="515" y="285" width="190" height="30" rx="10" fill="#8b5cf6"/>
  <text x="522" y="330" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">learns internal</text>
  <text x="548" y="354" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">representations</text>

  <rect x="900" y="140" width="240" height="220" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
  <text x="930" y="190" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Representation</text>
  <text x="930" y="240" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">embedding vector</text>
  <text x="930" y="275" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">latent features</text>
  <text x="930" y="310" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">compressed signal</text>

  <rect x="405" y="400" width="420" height="118" rx="20" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="12 10"/>
  <text x="436" y="435" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">Pretraining phase</text>

  <rect x="430" y="448" width="170" height="50" rx="14" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text x="448" y="480" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">supervised target</text>

  <rect x="630" y="448" width="180" height="50" rx="14" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
  <text x="650" y="480" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">self-supervised</text>

  <line x1="310" y1="250" x2="470" y2="250" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="250" x2="900" y2="250" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="515" y1="360" x2="515" y2="448" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowSmall)"/>
  <line x1="720" y1="360" x2="720" y2="448" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowSmall)"/>

  <path d="M 760 120 C 845 92, 910 92, 1015 118" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrowSmall)"/>
  <text x="790" y="88" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#334155">after pretraining, reuse encoder on new inputs</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/>
    </marker>
    <marker id="arrowSmall" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>