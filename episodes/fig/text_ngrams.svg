<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Text n-gram visual</title>
  <desc id="desc">A diagram showing a sentence split into tokens, unigrams, and bigrams.</desc>
  <rect width="960" height="420" fill="#fbf8f1"/>
  <text x="60" y="55" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">From sentence to n-grams</text>
  <text x="60" y="90" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#374151">Example sentence: "gene expression predicts response"</text>

  <rect x="60" y="120" width="160" height="52" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <rect x="240" y="120" width="190" height="52" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <rect x="450" y="120" width="135" height="52" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <rect x="605" y="120" width="155" height="52" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="153" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">gene</text>
  <text x="280" y="153" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">expression</text>
  <text x="480" y="153" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">predicts</text>
  <text x="645" y="153" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">response</text>

  <text x="60" y="220" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Unigrams</text>
  <rect x="60" y="240" width="110" height="40" rx="10" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="185" y="240" width="145" height="40" rx="10" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="345" y="240" width="110" height="40" rx="10" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="470" y="240" width="120" height="40" rx="10" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text x="91" y="266" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#111827">gene</text>
  <text x="217" y="266" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#111827">expression</text>
  <text x="364" y="266" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#111827">predicts</text>
  <text x="497" y="266" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#111827">response</text>

  <text x="60" y="330" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Bigrams</text>
  <rect x="60" y="350" width="220" height="40" rx="10" fill="#c7f9cc" stroke="#22c55e" stroke-width="2"/>
  <rect x="300" y="350" width="235" height="40" rx="10" fill="#c7f9cc" stroke="#22c55e" stroke-width="2"/>
  <rect x="555" y="350" width="205" height="40" rx="10" fill="#c7f9cc" stroke="#22c55e" stroke-width="2"/>
  <text x="94" y="376" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#111827">gene expression</text>
  <text x="332" y="376" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#111827">expression predicts</text>
  <text x="585" y="376" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#111827">predicts response</text>
</svg>