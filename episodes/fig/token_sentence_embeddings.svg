<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">From tokens to sentence embedding</title>
  <desc id="desc">A diagram showing a sentence split into tokens, each token mapped to a vector, and the vectors combined into one sentence embedding for downstream tasks.</desc>
  <rect width="1200" height="560" fill="#fbfaf7"/>

  <text x="60" y="58" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2937">From text to an embedding</text>
  <text x="60" y="92" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#475569">A representation model turns text into vectors that preserve useful structure for later tasks.</text>

  <rect x="60" y="130" width="340" height="110" rx="18" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
  <text x="88" y="176" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2937">Input sentence</text>
  <text x="84" y="215" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">"patient responded to treatment"</text>

  <text x="85" y="295" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Tokenised text</text>
  <rect x="80" y="320" width="112" height="46" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="206" y="320" width="132" height="46" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="352" y="320" width="54" height="46" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="420" y="320" width="128" height="46" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="103" y="349" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">patient</text>
  <text x="228" y="349" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">responded</text>
  <text x="370" y="349" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">to</text>
  <text x="444" y="349" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">treatment</text>

  <rect x="450" y="130" width="350" height="310" rx="20" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
  <text x="545" y="174" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Encoder</text>
  <text x="458" y="208" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#374151">maps each token to a learned vector</text>

  <rect x="500" y="240" width="86" height="122" rx="14" fill="#c4b5fd"/>
  <rect x="608" y="225" width="86" height="137" rx="14" fill="#a78bfa"/>
  <rect x="716" y="250" width="86" height="112" rx="14" fill="#8b5cf6"/>
  <line x1="520" y1="272" x2="566" y2="272" stroke="#4338ca" stroke-width="3"/>
  <line x1="520" y1="302" x2="566" y2="302" stroke="#4338ca" stroke-width="3"/>
  <line x1="520" y1="332" x2="566" y2="332" stroke="#4338ca" stroke-width="3"/>
  <line x1="628" y1="257" x2="674" y2="257" stroke="#4338ca" stroke-width="3"/>
  <line x1="628" y1="287" x2="674" y2="287" stroke="#4338ca" stroke-width="3"/>
  <line x1="628" y1="317" x2="674" y2="317" stroke="#4338ca" stroke-width="3"/>
  <line x1="736" y1="282" x2="782" y2="282" stroke="#4338ca" stroke-width="3"/>
  <line x1="736" y1="312" x2="782" y2="312" stroke="#4338ca" stroke-width="3"/>
  <line x1="736" y1="342" x2="782" y2="342" stroke="#4338ca" stroke-width="3"/>
  <text x="495" y="398" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#111827">token vectors shift as context changes</text>

  <rect x="850" y="130" width="280" height="200" rx="20" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
  <text x="900" y="176" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Sentence</text>
  <text x="900" y="208" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">embedding</text>
  <rect x="940" y="225" width="96" height="90" rx="14" fill="#86efac"/>
  <line x1="960" y1="247" x2="1016" y2="247" stroke="#166534" stroke-width="3"/>
  <line x1="960" y1="267" x2="1016" y2="267" stroke="#166534" stroke-width="3"/>
  <line x1="960" y1="287" x2="1016" y2="287" stroke="#166534" stroke-width="3"/>
  <rect x="850" y="380" width="280" height="110" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
  <text x="898" y="424" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Downstream task</text>
  <text x="890" y="458" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">classification or retrieval</text>

  <line x1="400" y1="186" x2="450" y2="186" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="330" y1="366" x2="450" y2="366" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="800" y1="275" x2="850" y2="275" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="990" y1="330" x2="990" y2="380" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>