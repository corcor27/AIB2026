<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">TF-IDF computation example</title>
  <desc id="desc">A diagram showing one simple TF-IDF calculation for the term gene across three documents.</desc>
  <rect width="1180" height="520" fill="#fcfaf5"/>

  <rect x="50" y="40" width="320" height="170" rx="16" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="75" y="78" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Example corpus</text>
  <text x="75" y="118" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">Document 1: gene expression model</text>
  <text x="75" y="152" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">Document 2: gene pathway analysis</text>
  <text x="75" y="186" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">Document 3: climate policy debate</text>

  <rect x="430" y="40" width="300" height="170" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="455" y="78" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Choose one term</text>
  <text x="455" y="126" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">term = "gene"</text>
  <text x="455" y="162" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">TF in Document 1 = 1</text>
  <text x="455" y="192" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#111827">DF across corpus = 2</text>

  <rect x="790" y="40" width="340" height="170" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="815" y="78" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Compute the weight</text>
  <text x="815" y="124" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">N = 3 documents</text>
  <text x="815" y="158" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">IDF = log(3 / 2)</text>
  <text x="815" y="192" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#111827">TF-IDF = 1 × log(3 / 2)</text>

  <rect x="50" y="270" width="1080" height="180" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="80" y="320" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#111827">TF-IDF(term, document) = TF(term, document) × log(N / DF(term))</text>
  <text x="80" y="368" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#374151">Terms that appear often in one document can still matter, but terms that appear in almost every document receive a smaller inverse-document-frequency factor.</text>
  <text x="80" y="408" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#374151">So very common words are down-weighted, while more distinctive terms keep more influence in the feature vector.</text>

  <line x1="370" y1="125" x2="430" y2="125" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="730" y1="125" x2="790" y2="125" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>